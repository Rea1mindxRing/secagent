name: Secret Scan — 敏感配置检查

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 运行敏感配置扫描
        run: |
          python scripts/check_sensitive_config.py --verbose

      - name: (可选) 安装 gitleaks 并运行
        continue-on-error: true
        run: |
          GITLEAKS_VERSION="8.18.2"
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -O /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin/ gitleaks
          gitleaks detect --source . --no-git --verbose 2>&1 || true